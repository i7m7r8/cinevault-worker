name: Deploy Worker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
      - name: Build & Deploy Worker
        run: |
          curl -fsSL https://github.com/cloudflare/workers-rs/releases/download/v0.4.0/worker-build-x86_64-unknown-linux-musl -o worker-build
          chmod +x worker-build
          ./worker-build --release
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
